name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda dependencies and run tests
        run: |
          pip install pytest pytest-cov moto boto3

          for lambda in entry story_generation image_generation pdf_assembly retrieval; do
            echo "--- Installing dependencies for $lambda ---"
            pip install -r lambdas/$lambda/requirements.txt

            echo "--- Running tests for $lambda ---"
            pytest lambdas/$lambda/tests/ \
              --cov=lambdas/$lambda \
              --cov-report=term-missing \
              -v \
              || true
          done

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  deploy-infra:
    name: Deploy CDK infrastructure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        run: |
          cd infra
          pip install -r requirements.txt

      - name: Package Lambda functions
        run: |
          mkdir -p infra/lambda_packages

          for lambda in entry story_generation image_generation pdf_assembly retrieval; do
            echo "--- Packaging $lambda ---"
            mkdir -p /tmp/lambda_build/$lambda
            pip install -r lambdas/$lambda/requirements.txt -t /tmp/lambda_build/$lambda
            cp lambdas/$lambda/handler.py /tmp/lambda_build/$lambda/
            cd /tmp/lambda_build/$lambda
            zip -r $GITHUB_WORKSPACE/infra/lambda_packages/${lambda}.zip .
            cd $GITHUB_WORKSPACE
          done

      - name: CDK deploy all stacks
        run: |
          cd infra
          cdk deploy --all \
            --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Save CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infra/cdk-outputs.json

  deploy-frontend:
    name: Deploy frontend to S3
    runs-on: ubuntu-latest
    needs: deploy-infra
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://d2633mrual.execute-api.us-east-1.amazonaws.com/prod
        run: |
          cd frontend
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/ \
            --delete \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          echo "CloudFront invalidation placeholder"